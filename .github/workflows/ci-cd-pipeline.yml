name: TechNova CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Unit and Integration Tests
        run: |
          pytest --junitxml=test-results.xml

  build-and-push:
    name: Build & Push Docker Image
    needs: test  
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/technova-inventory:latest
            ${{ secrets.DOCKER_USERNAME }}/technova-inventory:${{ github.sha }}

  deploy:
    name: Automated Deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Environment
        run: |
          echo "Deploying version ${{ github.sha }} to Server..."